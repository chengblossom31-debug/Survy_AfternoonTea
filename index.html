<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不要對我尖叫 — 團購點餐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ── 全域變數 ── */
  :root {
    --brand: #E8571A;
    --brand-light: #FDF0EA;
    --brand-dark: #B83F0F;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e5e5e5;
    --bg: #fafaf8;
    --card: #ffffff;
    --success: #2D7D46;
    --danger: #C0392B;
    --danger-light: #FDF0EF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* ── 頂部導覽列 ── */
  .top-bar {
    background: var(--text); color: white;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .top-bar .brand { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .top-bar .step-indicator { font-size: 13px; color: rgba(255,255,255,0.6); }

  /* ── 頁面切換（5個步驟頁面） ── */
  .page { display: none; max-width: 480px; margin: 0 auto; padding: 24px 16px; }
  .page.active { display: block; }

  /* ── 步驟1：輸入姓名 ── */
  .hero-area { text-align: center; padding: 40px 0 32px; }
  .hero-icon {
    width: 80px; height: 80px; background: var(--brand);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 36px;
  }
  .hero-area h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .hero-area p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .budget-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--brand-light); color: var(--brand-dark);
    border-radius: 100px; padding: 6px 16px;
    font-size: 13px; font-weight: 500; margin-top: 12px;
  }
  .field-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
  .field-input {
    width: 100%; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    font-size: 16px; font-family: inherit;
    outline: none; transition: border-color 0.2s; background: white;
  }
  .field-input:focus { border-color: var(--brand); }
  .btn-primary {
    width: 100%; padding: 16px;
    background: var(--brand); color: white;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 16px;
  }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  /* ── 步驟2：預算進度條（sticky，會固定在頂部）── */
  .budget-bar-wrap {
    background: white; border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 16px;
    position: sticky; top: 50px; z-index: 50;
  }
  .budget-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .budget-bar-label { font-size: 13px; color: var(--text-muted); }
  .budget-bar-amount { font-size: 18px; font-weight: 700; }
  .budget-bar-amount.over { color: var(--danger); }
  .budget-track { background: #f0f0f0; border-radius: 100px; height: 8px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 100px; transition: width 0.3s, background 0.3s; background: var(--brand); }
  .budget-fill.over { background: var(--danger); }
  .over-msg { color: var(--danger); font-size: 12px; margin-top: 6px; font-weight: 500; }

  /* ── 步驟2：分類 Tab（多行顯示，確保所有分類可見）── */
  .cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .cat-tab {
    flex: 0 0 auto; padding: 7px 14px;
    border: 1.5px solid var(--border); border-radius: 100px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: white; color: var(--text-muted);
    transition: all 0.15s; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-tab.active { background: var(--text); color: white; border-color: var(--text); }

  /* ── 步驟2：菜單品項卡片 ── */
  .menu-section { margin-bottom: 24px; }
  .menu-section-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted);
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .menu-item {
    background: white; border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .menu-item:hover { border-color: var(--brand); box-shadow: 0 2px 8px rgba(232,87,26,0.08); }
  .menu-item-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .menu-item-name { font-size: 15px; font-weight: 500; }
  .menu-item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .menu-item-price { font-size: 14px; font-weight: 700; color: var(--brand); white-space: nowrap; margin-left: 12px; }
  .menu-item-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; background: #f3f3f3; color: var(--text-muted); }
  .tag.fixed { background: #FEF3C7; color: #92400E; }
  .tag.limited { background: #DCFCE7; color: #166534; }

  /* ── 步驟2：品項選擇 Modal（從底部滑出）── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
    padding: 24px 20px 100px;
  }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-price { font-size: 14px; color: var(--brand); font-weight: 500; margin-bottom: 16px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section-label { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); }
  .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .option-btn {
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 13px; font-weight: 500;
    cursor: pointer; background: white; transition: all 0.15s;
    text-align: center; font-family: inherit;
  }
  .option-btn.selected { border-color: var(--brand); background: var(--brand-light); color: var(--brand-dark); }
  .option-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .option-4 { grid-template-columns: 1fr 1fr; }
  .topping-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .topping-item:last-child { border-bottom: none; }
  .topping-name { font-size: 14px; }
  .topping-price { font-size: 13px; color: var(--text-muted); }
  .topping-check {
    width: 22px; height: 22px; border: 2px solid var(--border);
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .topping-check.checked { background: var(--brand); border-color: var(--brand); color: white; }
  /* 加入購物車按鈕（固定在 modal 底部）*/
  .modal-add-btn {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; padding: 16px 20px 32px;
    background: white; border-top: 1px solid var(--border);
  }
  .modal-add-btn button {
    width: 100%; padding: 15px; background: var(--brand); color: white;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
  }
  .modal-add-btn button:disabled { background: #ccc; cursor: not-allowed; }
  .modal-note { font-size: 12px; color: #D97706; background: #FEF3C7; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; line-height: 1.5; }

  /* ── 步驟2：底部購物車按鈕（固定在畫面底部）── */
  .cart-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; padding: 12px 16px 28px; z-index: 90;
  }
  .cart-btn {
    width: 100%; padding: 15px 20px; background: var(--text); color: white;
    border: none; border-radius: 14px; font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .cart-btn.over { background: var(--danger); }
  .cart-btn:disabled { background: #ccc; cursor: not-allowed; }
  .cart-count { background: var(--brand); border-radius: 100px; padding: 3px 10px; font-size: 12px; }

  /* ── 步驟3：確認訂單 ── */
  .confirm-item { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .confirm-item-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .confirm-item-name { font-size: 15px; font-weight: 500; }
  .confirm-item-price { font-size: 15px; font-weight: 700; color: var(--brand); }
  .confirm-item-detail { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .confirm-item-remove {
    font-size: 12px; color: var(--danger); cursor: pointer;
    background: none; border: none; font-family: inherit; margin-top: 6px; padding: 0;
  }
  .total-bar {
    background: var(--text); color: white; border-radius: 14px; padding: 16px;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 16px; margin-bottom: 24px;
  }
  .total-bar span { font-size: 15px; }
  .total-bar strong { font-size: 20px; }
  .over-budget-warn {
    background: var(--danger-light); color: var(--danger);
    border-radius: 10px; padding: 12px; margin-bottom: 12px; font-size: 13px; font-weight: 500;
  }

  /* ── 步驟5：送出成功 ── */
  .success-wrap { text-align: center; padding: 60px 0; }
  .success-icon {
    width: 90px; height: 90px; background: #DCFCE7; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 40px;
  }
  .success-wrap h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-wrap p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  .order-summary-card {
    background: white; border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; text-align: left; margin-top: 24px;
  }
  .order-summary-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-muted); }

  /* ── 共用元件 ── */
  .btn-secondary {
    width: 100%; padding: 14px; background: white; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 10px;
  }
  .qty-control { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .qty-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border); background: white;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--brand); color: var(--brand); }
  .qty-val { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }

  /* ── 浮動按鈕：分類/回頂部（在點餐頁往下滑後出現）── */
  .float-nav {
    position: fixed; bottom: 90px; right: 16px;
    display: none; flex-direction: column; gap: 8px; z-index: 80;
  }
  .float-nav.visible { display: flex; }
  .float-btn {
    width: 44px; height: 44px; background: var(--text); color: white;
    border: none; border-radius: 50%; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    -webkit-tap-highlight-color: transparent; transition: background 0.15s, transform 0.1s;
  }
  .float-btn:active { transform: scale(0.92); }

  /* ── 分類抽屜（點 ☰ 後從底部滑出）── */
  .cat-drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; display: none; }
  .cat-drawer-overlay.open { display: block; }
  .cat-drawer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; z-index: 160;
    transform: translateY(100%); transition: transform 0.28s ease;
  }
  .cat-drawer-overlay.open .cat-drawer { transform: translateY(0); }
  .cat-drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 16px; }
  .cat-drawer-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
  .cat-drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cat-drawer-btn {
    padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 14px; font-weight: 500; cursor: pointer; background: white; color: var(--text);
    font-family: inherit; text-align: left; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cat-drawer-btn:active { background: var(--brand-light); border-color: var(--brand); color: var(--brand-dark); }
</style>
</head>
<body>

<!-- ── 頂部標題列 ── -->
<div class="top-bar">
  <span class="brand">🧋 不要對我尖叫</span>
  <span class="step-indicator" id="stepLabel">步驟 1/5</span>
</div>

<!-- ══════════════════════════════════════
     步驟1：輸入姓名
     ══════════════════════════════════════ -->
<div class="page active" id="page1">
  <div class="hero-area">
    <div class="hero-icon">🧋</div>
    <h1>今天想喝什麼？</h1>
    <p>團購點餐系統<br>每人預算 <strong>80元</strong>，在預算內隨意點！</p>
    <div class="budget-badge">🪙 每人上限 NT$80</div>
  </div>
  <div style="margin-top: 12px;">
    <div class="field-label">你的姓名</div>
    <input class="field-input" id="nameInput" type="text" placeholder="請輸入姓名" maxlength="20">
    <button class="btn-primary" onclick="goToMenu()" id="nameBtn" disabled>下一步 →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     步驟2：菜單點餐
     ══════════════════════════════════════ -->
<div class="page" id="page2">
  <!-- 預算進度條（sticky 置頂）-->
  <div class="budget-bar-wrap">
    <div class="budget-bar-header">
      <span class="budget-bar-label" id="budgetName">你的預算</span>
      <span class="budget-bar-amount" id="budgetAmt">$0 / $80</span>
    </div>
    <div class="budget-track">
      <div class="budget-fill" id="budgetFill" style="width:0%"></div>
    </div>
    <div class="over-msg" id="overMsg" style="display:none">⚠️ 已超過 $80 預算，請移除部分餐點</div>
  </div>

  <!-- 分類 Tab -->
  <div class="cat-tabs" id="catTabs"></div>
  <!-- 菜單內容（由 JS buildMenu() 動態產生）-->
  <div id="menuContainer"></div>

  <!-- 底部購物車按鈕 -->
  <div class="cart-bar">
    <button class="cart-btn" id="cartBtn" onclick="goToConfirm()" disabled>
      <span>查看訂單 <span class="cart-count" id="cartCount">0</span></span>
      <span id="cartTotal">$0</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════
     步驟3：確認訂單
     ══════════════════════════════════════ -->
<div class="page" id="page3">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:4px">確認訂單</h2>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">訂購人：<strong id="confirmName"></strong></p>
  <div id="confirmList"></div>
  <div class="total-bar">
    <span>總計</span>
    <strong id="confirmTotal">$0</strong>
  </div>
  <div class="over-budget-warn" id="confirmOverWarn" style="display:none">⚠️ 超過預算 $80，無法送出訂單。請返回修改。</div>
  <button class="btn-primary" id="submitBtn" onclick="submitOrder()">送出訂單 ✓</button>
  <button class="btn-secondary" onclick="goBack(2)">← 返回修改</button>
</div>

<!-- ══════════════════════════════════════
     步驟4：送出中
     ══════════════════════════════════════ -->
<div class="page" id="page4">
  <div class="success-wrap">
    <div class="success-icon">⏳</div>
    <h2>送出中...</h2>
    <p>正在儲存您的訂單，請稍候</p>
  </div>
</div>

<!-- ══════════════════════════════════════
     步驟5：送出成功
     ══════════════════════════════════════ -->
<div class="page" id="page5">
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <h2>訂單送出成功！</h2>
    <p id="successMsg"></p>
    <div class="order-summary-card" id="successSummary"></div>
  </div>
</div>

<!-- ── 浮動按鈕（點餐頁滑下後出現）── -->
<div class="float-nav" id="floatNav">
  <button class="float-btn" title="選擇分類" onclick="openCatDrawer()">☰</button>
  <button class="float-btn" title="回到頂部" onclick="scrollToTop()">↑</button>
</div>

<!-- ── 分類抽屜（點 ☰ 後出現）── -->
<div class="cat-drawer-overlay" id="catDrawerOverlay" onclick="closeCatDrawer(event)">
  <div class="cat-drawer">
    <div class="cat-drawer-handle"></div>
    <div class="cat-drawer-title">選擇分類</div>
    <div class="cat-drawer-grid" id="catDrawerGrid"></div>
  </div>
</div>

<!-- ── 品項選擇 Modal（點品項後從底部滑出）── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
    <div class="modal-add-btn">
      <button id="modalAddBtn" onclick="addToCart()">加入購物車</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// 【設定區】修改這裡的值即可調整系統行為
// ══════════════════════════════════════════════════════════════

// ⚠️ 將 GAS 部署 URL 貼在這裡（不要有多餘空格）
// 取得方式：GAS 編輯器 → 部署 → 管理部署 → 複製網頁應用程式 URL
const GAS_URL = 'https://script.google.com/macros/s/AKfycbznNwiiZI5wqAhnLwTt7Z1HVBNWyIzyARSXu1yOzVpeqsOk61HaSsTSdtU31c2Gm3bX/exec';

// 每人預算上限（新台幣元）
const BUDGET = 80;

// ══════════════════════════════════════════════════════════════
// 【菜單資料】
// ══════════════════════════════════════════════════════════════

// 甜度選項（按鈕順序）
const SWEETNESS = ['無糖', '微糖(10%)', '半糖(30%)', '正常甜'];

// 冰量選項（按鈕順序）
// 注意：「溫熱飲」是在程式碼裡另外加上去的，不在這個陣列內
const ICE = ['完全去冰', '去冰', '微冰(10%)', '少冰(30%)'];

// 加料選項與價格
const TOPPINGS = [
  { name: '黑糖珍珠', price: 10 },
  { name: '白玉珍珠', price: 10 },
  { name: '蜜檸凍',   price: 15 },
  { name: '桂花凍',   price: 15 },
  { name: '原味椰果', price: 15 },
  { name: '經典奶蓋', price: 20 },
];

// 菜單結構
// 欄位說明請見 HTML 頂部的 <!-- 修改菜單 --> 區塊
const MENU = [
  {
    cat: '特選莊園茶',

// ══════════════════════════════════════════════════════════════
// 【全域狀態】
// ══════════════════════════════════════════════════════════════
let userName = '';      // 目前使用者姓名
let cart = [];          // 購物車內容 [{id, name, detail, qty, unitPrice, total}]
let currentItem = null; // 目前打開 modal 的品項
let currentSelection = {}; // 目前 modal 內的選擇狀態

// ══════════════════════════════════════════════════════════════
// 【初始化】頁面載入後綁定事件
// ══════════════════════════════════════════════════════════════
function initNameInput() {
  const nameInput = document.getElementById('nameInput');
  const nameBtn   = document.getElementById('nameBtn');
  if (!nameInput) return;
  // 輸入文字時即時啟用/停用按鈕
  nameInput.addEventListener('input', function() {
    nameBtn.disabled = this.value.trim() === '';
  });
  // 按 Enter 直接跳到下一步
  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim() !== '') goToMenu();
  });
}

// ══════════════════════════════════════════════════════════════
// 【頁面導覽】
// ══════════════════════════════════════════════════════════════
function showPage(n) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page' + n).classList.add('active');
  document.getElementById('stepLabel').textContent = '步驟 ' + n + '/5';
  window.scrollTo(0, 0);
}

function goToMenu() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  userName = name;
  buildMenu();
  showPage(2);
  document.getElementById('budgetName').textContent = userName + ' 的預算';
}

function goToConfirm() {
  if (isOverBudget() || cart.length === 0) return;
  renderConfirm();
  showPage(3);
}

// 超過預算時仍可進入確認頁刪除品項（送出按鈕會被鎖住）
function goToConfirmForEdit() {
  if (cart.length === 0) return;
  renderConfirm();
  showPage(3);
}

function goBack(page) { showPage(page); }

function isOverBudget() { return cartTotal() > BUDGET; }

// ══════════════════════════════════════════════════════════════
// 【建立菜單】
// ══════════════════════════════════════════════════════════════
function buildMenu() {
  const tabs      = document.getElementById('catTabs');
  const container = document.getElementById('menuContainer');
  tabs.innerHTML = '';
  container.innerHTML = '';

  MENU.forEach(function(cat, ci) {
    // 建立分類 Tab
    const tab = document.createElement('button');
    tab.className = 'cat-tab' + (ci === 0 ? ' active' : '');
    tab.textContent = cat.cat;
    tab.onclick = function() {
      document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('sec-' + ci).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    tabs.appendChild(tab);

    // 建立分類區段
    const sec = document.createElement('div');
    sec.className = 'menu-section';
    sec.id = 'sec-' + ci;
    sec.innerHTML = '<div class="menu-section-title">' + cat.cat + '</div>';

    cat.items.forEach(function(item) {
      const priceStr = item.single
        ? '$' + item.prices.U
        : (item.prices.L ? 'M $' + item.prices.M + ' / L $' + item.prices.L : 'M $' + item.prices.M);

      const tags = [];
      if (item.fixedSweet || item.fixedIce) tags.push('<span class="tag fixed">甜度/冰量固定</span>');
      if (item.sweetMin) tags.push('<span class="tag fixed">最少淺糖</span>');
      if (item.noTopping) tags.push('<span class="tag">配料固定</span>');
      if (item.note && item.note.includes('限定')) tags.push('<span class="tag limited">限定</span>');

      const div = document.createElement('div');
      div.className = 'menu-item';
      div.innerHTML =
        '<div class="menu-item-top">'
        + '<div><div class="menu-item-name">' + item.name + '</div>'
        + '<div class="menu-item-sub">' + item.sub + '</div></div>'
        + '<div class="menu-item-price">' + priceStr + '</div>'
        + '</div>'
        + (tags.length ? '<div class="menu-item-tags">' + tags.join('') + '</div>' : '');
      div.onclick = function() { openModal(item); };
      sec.appendChild(div);
    });
    container.appendChild(sec);
  });
}

// ══════════════════════════════════════════════════════════════
// 【購物車】
// ══════════════════════════════════════════════════════════════
function cartTotal() {
  return cart.reduce(function(s, i) { return s + i.total; }, 0);
}

function updateBudgetBar() {
  const total      = cartTotal();
  const pct        = Math.min((total / BUDGET) * 100, 100);
  const fill       = document.getElementById('budgetFill');
  const amt        = document.getElementById('budgetAmt');
  const overMsg    = document.getElementById('overMsg');
  const btn        = document.getElementById('cartBtn');
  const cartTotalEl = document.getElementById('cartTotal');
  const cartCountEl = document.getElementById('cartCount');
  if (!fill || !amt || !btn) return;

  const over = total > BUDGET;
  fill.style.width = pct + '%';
  fill.classList.toggle('over', over);
  amt.textContent = '$' + total + ' / $' + BUDGET;
  amt.classList.toggle('over', over);
  if (overMsg) overMsg.style.display = over ? 'block' : 'none';

  btn.disabled = cart.length === 0;
  btn.classList.toggle('over', over);
  // 超過預算：按鈕改為紅色並導到確認頁（可刪除品項）
  btn.onclick = function() { over ? goToConfirmForEdit() : goToConfirm(); };
  btn.querySelector('span:first-child').innerHTML = over
    ? '⚠️ 超出預算，點此修改 <span class="cart-count">' + cart.length + '</span>'
    : '查看訂單 <span class="cart-count">' + cart.length + '</span>';
  if (cartTotalEl) cartTotalEl.textContent = '$' + total;
  if (cartCountEl) cartCountEl.textContent = cart.length;
}

// ══════════════════════════════════════════════════════════════
// 【品項 Modal】
// ══════════════════════════════════════════════════════════════
function openModal(item) {
  currentItem = item;
  currentSelection = {
    size:     item.single ? 'U' : 'M',
    sweet:    item.fixedSweet ? '固定' : (item.sweetMin || '正常甜'),
    ice:      item.fixedIce ? '固定' : '少冰(30%)',
    toppings: [],
    qty:      1,
  };
  // 先顯示 modal，再 render（確保 DOM 元素已存在）
  document.getElementById('modalOverlay').classList.add('open');
  renderModal();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

function computeItemTotal() {
  const base     = currentItem.prices[currentSelection.size] || 0;
  const topCost  = currentSelection.toppings.reduce(function(s, t) { return s + t.price; }, 0);
  return (base + topCost) * currentSelection.qty;
}

function renderModal() {
  const item     = currentItem;
  const isSingle = item.single;
  let html = '';

  // 注意事項（黃色警告框）
  if (item.note) html += '<div class="modal-note">⚠️ ' + item.note + '</div>';
  html += '<div class="modal-title">' + item.name + '</div>';
  html += '<div class="modal-price" id="mPrice">$' + computeItemTotal() + '</div>';

  // 杯型（飲料才有）
  if (!isSingle) {
    html += '<div class="modal-section"><div class="modal-section-label">杯型</div><div class="option-grid">';
    Object.entries(item.prices).forEach(function(entry) {
      const s = entry[0], p = entry[1];
      html += '<button class="option-btn' + (currentSelection.size === s ? ' selected' : '') + '" data-action="size" data-val="' + s + '">'
        + (s === 'M' ? 'M 中杯' : 'L 大杯') + ' +$' + p + '</button>';
    });
    html += '</div></div>';
  }

  // 甜度（飲料且非固定）
  if (!isSingle && !item.fixedSweet) {
    const sweets = item.sweetMin ? SWEETNESS.slice(1) : SWEETNESS;
    html += '<div class="modal-section"><div class="modal-section-label">甜度</div><div class="option-grid option-' + (sweets.length > 2 ? '4' : '3') + '">';
    sweets.forEach(function(s) {
      html += '<button class="option-btn' + (currentSelection.sweet === s ? ' selected' : '') + '" data-action="sweet" data-val="' + s + '">' + s + '</button>';
    });
    html += '</div></div>';
  }

  // 冰量（飲料且非固定）
  if (!isSingle && !item.fixedIce) {
    const ices = item.limitedIce || ICE;
    html += '<div class="modal-section"><div class="modal-section-label">冰量</div><div class="option-grid option-' + (ices.length > 2 ? '4' : '3') + '">';
    ices.forEach(function(i) {
      html += '<button class="option-btn' + (currentSelection.ice === i ? ' selected' : '') + '" data-action="ice" data-val="' + i + '">' + i + '</button>';
    });
    if (!item.limitedIce) {
      html += '<button class="option-btn' + (currentSelection.ice === '溫熱飲' ? ' selected' : '') + '" data-action="ice" data-val="溫熱飲">溫熱飲</button>';
    }
    html += '</div></div>';
  }

  // 加料（飲料且非固定配料）
  // ⚠️ 注意：加料使用 data-name/data-price 屬性 + 事件委派
  //    不使用 onclick 字串，避免中文名稱在 HTML 屬性裡造成語法錯誤
  if (!item.noTopping && !isSingle) {
    html += '<div class="modal-section"><div class="modal-section-label">加料 (可複選)</div>';
    TOPPINGS.forEach(function(t) {
      const checked     = currentSelection.toppings.some(function(x) { return x.name === t.name; });
      // 不適合加奶蓋：氣泡飲、洛神蜂蜜菊花
      const noNaiGai    = (item.fixedSweet || item.id === 'b07') && t.name === '經典奶蓋';
      // 溫熱飲不能加果凍類
      const noJelly     = currentSelection.ice === '溫熱飲' && (t.name === '蜜檸凍' || t.name === '桂花凍');
      const disabled    = noNaiGai || noJelly;
      const checkClass  = 'topping-check' + (checked && !disabled ? ' checked' : '');
      const checkStyle  = disabled ? 'opacity:0.3;cursor:not-allowed' : 'cursor:pointer';
      const checkContent = (checked && !disabled) ? '&#10003;' : '';
      html += '<div class="topping-item">'
        + '<span class="topping-name">' + t.name + '</span>'
        + '<div style="display:flex;align-items:center;gap:12px">'
        + '<span class="topping-price">+$' + t.price + '</span>'
        + '<div class="' + checkClass + '"'
        + ' data-name="' + t.name + '" data-price="' + t.price + '"'
        + ' data-disabled="' + (disabled ? '1' : '0') + '"'
        + ' style="' + checkStyle + '">'
        + checkContent
        + '</div></div></div>';
    });
    html += '</div>';
  }

  // 數量
  html += '<div class="modal-section"><div class="modal-section-label">數量</div>'
    + '<div class="qty-control">'
    + '<button class="qty-btn" data-action="qty" data-val="-1">−</button>'
    + '<span class="qty-val" id="qtyVal">' + currentSelection.qty + '</span>'
    + '<button class="qty-btn" data-action="qty" data-val="1">+</button>'
    + '</div></div>';

  const modalContent = document.getElementById('modalContent');
  const modalAddBtn  = document.getElementById('modalAddBtn');
  if (!modalContent) return;
  modalContent.innerHTML = html;
  if (modalAddBtn) modalAddBtn.disabled = false;

  // 統一事件委派：所有 modal 內的互動都在這裡處理
  // 使用委派而非 inline onclick，避免 CSP 安全政策阻擋
  modalContent.onclick = function(e) {
    const topEl = e.target.closest('.topping-check');
    if (topEl) {
      if (topEl.dataset.disabled === '1') return;
      selectTopping(topEl.dataset.name, Number(topEl.dataset.price));
      return;
    }
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const val    = btn.dataset.val;
    if (action === 'size')  selectSize(val);
    else if (action === 'sweet') selectSweet(val);
    else if (action === 'ice')   selectIce(val);
    else if (action === 'qty')   changeQty(Number(val));
  };
}

function selectSize(s)  { currentSelection.size = s; renderModal(); }
function selectSweet(s) { currentSelection.sweet = s; renderModal(); }
function selectIce(i)   { currentSelection.ice = i; renderModal(); }
function selectTopping(name, price) {
  const idx = currentSelection.toppings.findIndex(function(t) { return t.name === name; });
  if (idx >= 0) currentSelection.toppings.splice(idx, 1);
  else currentSelection.toppings.push({ name: name, price: price });
  renderModal();
}
function changeQty(d) {
  currentSelection.qty = Math.max(1, currentSelection.qty + d);
  renderModal();
}

function addToCart() {
  const item     = currentItem;
  const total    = computeItemTotal();
  const sizeLabel = item.single ? '' : ' ' + currentSelection.size + '杯';
  const detail = [
    item.fixedSweet ? '甜度固定' : '甜度：' + currentSelection.sweet,
    item.fixedIce   ? '冰量固定' : '冰量：' + currentSelection.ice,
    currentSelection.toppings.length ? '加料：' + currentSelection.toppings.map(function(t) { return t.name; }).join('、') : '',
  ].filter(Boolean).join('｜');

  cart.push({
    id:        Date.now(),
    name:      item.name + sizeLabel,
    detail:    item.single ? '' : detail,
    qty:       currentSelection.qty,
    unitPrice: total / currentSelection.qty,
    total:     total,
  });

  document.getElementById('modalOverlay').classList.remove('open');
  updateBudgetBar();
}

// ══════════════════════════════════════════════════════════════
// 【確認訂單頁】
// ══════════════════════════════════════════════════════════════
function renderConfirm() {
  const nameEl   = document.getElementById('confirmName');
  const list     = document.getElementById('confirmList');
  const totalEl  = document.getElementById('confirmTotal');
  const warnEl   = document.getElementById('confirmOverWarn');
  const submitEl = document.getElementById('submitBtn');
  if (!nameEl || !list || !totalEl) return;

  nameEl.textContent = userName;
  list.innerHTML = '';

  cart.forEach(function(item, i) {
    const div = document.createElement('div');
    div.className = 'confirm-item';

    const top = document.createElement('div');
    top.className = 'confirm-item-top';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'confirm-item-name';
    nameSpan.textContent = (item.qty > 1 ? item.qty + 'x ' : '') + item.name;
    const priceSpan = document.createElement('span');
    priceSpan.className = 'confirm-item-price';
    priceSpan.textContent = '$' + item.total;
    top.appendChild(nameSpan);
    top.appendChild(priceSpan);
    div.appendChild(top);

    if (item.detail) {
      const detail = document.createElement('div');
      detail.className = 'confirm-item-detail';
      detail.textContent = item.detail;
      div.appendChild(detail);
    }

    const btn = document.createElement('button');
    btn.className = 'confirm-item-remove';
    btn.textContent = '✕ 移除';
    btn.dataset.index = i; // 用 data-index 避免 closure 問題
    div.appendChild(btn);

    list.appendChild(div);
  });

  // 移除按鈕：事件委派在 list 上，避免 forEach closure 的 index 錯位問題
  list.onclick = function(e) {
    const btn = e.target.closest('.confirm-item-remove');
    if (!btn) return;
    cart.splice(Number(btn.dataset.index), 1);
    updateBudgetBar();
    renderConfirm();
  };

  const total = cartTotal();
  totalEl.textContent = '$' + total;
  const over = total > BUDGET;
  if (warnEl)   warnEl.style.display = over ? 'block' : 'none';
  if (submitEl) submitEl.disabled = over;
}

// ══════════════════════════════════════════════════════════════
// 【送出訂單】
// ══════════════════════════════════════════════════════════════
async function submitOrder() {
  showPage(4);
  const orderData = {
    name: userName,
    items: cart.map(function(i) {
      return { name: i.name, detail: i.detail, qty: i.qty, unitPrice: i.unitPrice, total: i.total };
    }),
    totalAmount: cartTotal(),
    timestamp: new Date().toISOString(),
  };

  try {
    if (GAS_URL === 'https://script.google.com/macros/s/AKfycbznNwiiZI5wqAhnLwTt7Z1HVBNWyIzyARSXu1yOzVpeqsOk61HaSsTSdtU31c2Gm3bX/exec') {
      // Demo 模式：GAS_URL 未設定時，模擬等待 1.2 秒
      await new Promise(function(r) { setTimeout(r, 1200); });
    } else {
      // 使用 no-cors 模式送出（跨來源限制，無法取得回應內容）
      // ⚠️ 即使 GAS 內部發生錯誤，前端也會顯示成功，請事後確認 Sheets
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderData),
      });
    }
    showSuccessPage(orderData);
  } catch (err) {
    showSuccessPage(orderData);
  }
}

function showSuccessPage(data) {
  showPage(5);
  document.getElementById('successMsg').innerHTML = '<strong>' + data.name + '</strong> 的訂單已送出！';
  const summary = document.getElementById('successSummary');
  summary.innerHTML = '<h3>訂購明細</h3>'
    + data.items.map(function(i) {
        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">'
          + '<span>' + (i.qty > 1 ? i.qty + 'x ' : '') + i.name + '</span>'
          + '<span>$' + i.total + '</span></div>';
      }).join('')
    + '<div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700"><span>合計</span><span>$' + data.totalAmount + '</span></div>';
}

// ══════════════════════════════════════════════════════════════
// 【浮動按鈕】回頂部 + 分類抽屜
// ══════════════════════════════════════════════════════════════
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openCatDrawer() {
  const overlay = document.getElementById('catDrawerOverlay');
  const grid    = document.getElementById('catDrawerGrid');
  grid.innerHTML = '';
  MENU.forEach(function(cat, ci) {
    const btn = document.createElement('button');
    btn.className = 'cat-drawer-btn';
    btn.textContent = cat.cat;
    btn.onclick = function() {
      closeCatDrawer();
      setTimeout(function() {
        const sec = document.getElementById('sec-' + ci);
        if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 280);
    };
    grid.appendChild(btn);
  });
  overlay.classList.add('open');
}

function closeCatDrawer(e) {
  if (e && e.target !== document.getElementById('catDrawerOverlay')) return;
  document.getElementById('catDrawerOverlay').classList.remove('open');
}

// 往下滑超過 100px 且在點餐頁時，顯示浮動按鈕
window.addEventListener('scroll', function() {
  const floatNav = document.getElementById('floatNav');
  if (!floatNav) return;
  const page2 = document.getElementById('page2');
  if (page2 && page2.classList.contains('active')) {
    floatNav.classList.toggle('visible', window.scrollY > 100);
  } else {
    floatNav.classList.remove('visible');
  }
});

// ── 啟動 ──
initNameInput();
</script>
